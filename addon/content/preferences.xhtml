<linkset>
  <html:link rel="localization" href="__addonRef__-preferences.ftl" />
  <html:style>
    .color-box {
      width: 32px;
      height: 32px;
      border: 3px solid transparent;
      margin: 5px;
      cursor: pointer;
    }
    .color-box.selected {
      border-color: Highlight;
    }
    .pref-hr {
      border: none;
      height: 1px;
      background-color: var(--toolbar-background, #ccc);
      margin: 6px 0 10px 0;
    }
  </html:style>
</linkset>
<groupbox
  onload="Zotero.__addonInstance__.hooks.onPrefsEvent('load', { window });"
>
  <label><html:h1 data-l10n-id="pref-title"></html:h1></label>
  <label
      control="zotero-prefpane-__addonRef__-color-container"
      data-l10n-id="pref-color"
  />
  <hbox align="center">
    <hbox id="zotero-prefpane-__addonRef__-color-container">
      <div class="color-box" data-color="rgba(255, 255, 0, 0.4)" style="background-color: rgba(255, 255, 0, 0.4);"></div>
      <div class="color-box" data-color="rgba(144, 238, 144, 0.4)" style="background-color: rgba(144, 238, 144, 0.4);"></div>
      <div class="color-box" data-color="rgba(173, 216, 230, 0.4)" style="background-color: rgba(173, 216, 230, 0.4);"></div>
      <div class="color-box" data-color="rgba(255, 182, 193, 0.4)" style="background-color: rgba(255, 182, 193, 0.4);"></div>
      <div class="color-box" data-color="rgba(221, 160, 221, 0.4)" style="background-color: rgba(221, 160, 221, 0.4);"></div>
    </hbox>
  </hbox>
</groupbox>
<html:hr class="pref-hr" />
<vbox>
  <html:label
    data-l10n-id="pref-help"
    data-l10n-args='{"time": "__buildTime__","name": "__addonName__","version":"__buildVersion__"}'
  ></html:label>
</vbox>
